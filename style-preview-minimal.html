<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Preview</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfcfc; color: #333; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .quiz-container { background: #fff; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); max-width: 500px; width: 100%; border: 1px solid #eaeaea; }
  h2 { font-weight: 500; font-size: 1.5rem; margin-bottom: 2rem; color: #111; line-height: 1.4; }
  .option { display: block; width: 100%; padding: 1rem 1.5rem; margin-bottom: 1rem; border: 1px solid #eaeaea; border-radius: 8px; background: transparent; color: #555; text-align: left; font-size: 1rem; cursor: pointer; transition: all 0.2s ease; box-sizing: border-box; }
  .option:hover { border-color: #888; color: #111; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>
<body>
  <div class="quiz-container">
    <h2>It is Saturday morning. What are you doing?</h2>
    <button class="option">A) Reading a book by the window</button>
    <button class="option">B) Getting ready for a spontaneous road trip</button>
    <button class="option">C) Hosting brunch for a few close friends</button>
    <button class="option">D) Deep-cleaning the apartment to a curated playlist</button>
  </div>
</body>
</html>
