<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bold Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;500&display=swap');
  body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #fdfbf7; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .quiz-container { background: #1a1c23; padding: 3rem; border-radius: 0px; border-top: 4px solid #d4af37; max-width: 500px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
  h2 { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.8rem; margin-bottom: 2.5rem; color: #d4af37; line-height: 1.3; }
  .option { display: block; width: 100%; padding: 1.2rem 1.5rem; margin-bottom: 1rem; border: 1px solid #333; border-radius: 4px; background: transparent; color: #e0e0e0; text-align: left; font-size: 1rem; cursor: pointer; transition: all 0.2s ease; box-sizing: border-box; font-weight: 500; }
  .option:hover { border-color: #d4af37; color: #fff; background: rgba(212, 175, 55, 0.05); }
</style>
</head>
<body>
  <div class="quiz-container">
    <h2>It is Saturday morning. What are you doing?</h2>
    <button class="option">A) Reading a book by the window</button>
    <button class="option">B) Getting ready for a spontaneous road trip</button>
    <button class="option">C) Hosting brunch for a few close friends</button>
    <button class="option">D) Deep-cleaning the apartment to a curated playlist</button>
  </div>
</body>
</html>
