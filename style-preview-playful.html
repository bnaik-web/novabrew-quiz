<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playful Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap');
  body { font-family: 'Nunito', sans-serif; background-color: #fff4e6; color: #4a3b32; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .quiz-container { background: #ffffff; padding: 2.5rem; border-radius: 24px; max-width: 500px; width: 100%; box-shadow: 0 10px 30px rgba(255, 153, 102, 0.15); text-align: center; border: 3px solid #ffccb3; }
  h2 { font-weight: 800; font-size: 1.6rem; margin-bottom: 2rem; color: #ff6633; line-height: 1.4; }
  .option { display: block; width: 100%; padding: 1rem 1.5rem; margin-bottom: 1rem; border: none; border-radius: 99px; background: #ffe6cc; color: #4a3b32; text-align: center; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-sizing: border-box; }
  .option:hover { background: #ffcc99; color: #cc4400; transform: scale(1.03); }
</style>
</head>
<body>
  <div class="quiz-container">
    <h2>It is Saturday morning. What are you doing?</h2>
    <button class="option">📚 Reading a book by the window</button>
    <button class="option">🚗 Getting ready for a spontaneous road trip</button>
    <button class="option">🥞 Hosting brunch for a few close friends</button>
    <button class="option">✨ Deep-cleaning to a curated playlist</button>
  </div>
</body>
</html>
